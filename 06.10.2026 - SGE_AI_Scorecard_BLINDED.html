function scoreScenario(answers) {
  // product
  const pLaunch = answers.product_launch;
  const pRev    = answers.product_rev;
  const pRD     = answers.product_rd;
  const pC1 = pLaunch === "advanced";
  const pC2 = pRev    === "high";
  const pC3 = pRD     === "high";
  const pN  = [pC1,pC2,pC3].filter(Boolean).length;
  const product = pN===3?"Leading":pN===2?"Progressing":"Needs Attention";

  // devprod
  const dUse    = answers.dev_use;
  const dTools  = answers.dev_tools;
  const dImpact = answers.dev_impact;
  const dC1 = dUse    === "yes";
  const dC2 = dTools  === "multi";
  const dC3 = dImpact === "high";
  const dN  = [dC1,dC2,dC3].filter(Boolean).length;
  const devprod = dN===3?"Leading":dN===2?"Progressing":"Needs Attention";

  // datainfra
  const diBreadth = answers.data_breadth;
  const diAccess  = answers.data_access;
  const diApi     = answers.data_api;
  const diC1 = diBreadth === "high";
  const diC2 = diAccess  === "api";
  const diC3 = diApi     === "yes";
  const diN  = [diC1,diC2,diC3].filter(Boolean).length;
  const datainfra = diN===3?"Leading":diN===2?"Progressing":"Needs Attention";

  // gtm
  const gTof    = answers.gtm_tof;
  const gMof    = answers.gtm_mof;
  const gImpact = answers.gtm_impact;
  const gC1 = gTof    === "high";
  const gC2 = gMof    === "high";
  const gC3 = gImpact === "yes";
  const gN  = [gC1,gC2,gC3].filter(Boolean).length;
  const gtm = gN===3?"Leading":gN===2?"Progressing":"Needs Attention";

  // postsales
  const psChatbot    = answers.ps_chatbot;
  const psDeflection = answers.ps_deflection;
  const psCsat       = answers.ps_csat;
  const psC1 = psChatbot    === "yes";
  const psC2 = psDeflection === "high";
  const psC3 = psCsat       === "yes";
  const psN  = [psC1,psC2,psC3].filter(Boolean).length;
  const postsales = psN===3?"Leading":psN===2?"Progressing":"Needs Attention";

  // hiring
  const hRoles  = answers.hiring_roles;
  const hImpact = answers.hiring_impact;
  const hC1 = hRoles  === "yes";
  const hC2 = hImpact === "high";
  const hN  = [hC1,hC2].filter(Boolean).length;
  const hiring = hN===2?"Leading":hN===1?"Progressing":"Needs Attention";

  // internal
  const iAdopt   = answers.int_adoption;
  const iAgents  = answers.int_agents;
  const iMeasure = answers.int_measure;
  const iSavings = answers.int_savings;
  const iLicense = answers.int_license;
  const iC1 = iAdopt   === "high";
  const iC2 = iAgents  === "yes";
  const iC3 = iMeasure === "both";
  const iC4 = iSavings === "high";
  const iC5 = iLicense === "yes";
  const iN  = [iC1,iC2,iC3,iC4,iC5].filter(Boolean).length;
  const internal = iN===5?"Leading":iN>=3?"Progressing":"Needs Attention";

  const secMap = {product,devprod,datainfra,gtm,postsales,hiring,internal};
  const scores = SECS.map(s=>({...s,tier:secMap[s.k],na:false}));
  const valid = scores.filter(s=>!s.na);
  const leading    = valid.filter(s=>s.tier==="Leading").map(s=>s.l);
  const developing = valid.filter(s=>s.tier==="Progressing").map(s=>s.l);
  const attention  = valid.filter(s=>s.tier==="Needs Attention").map(s=>s.l);
  const tier = getOverall(leading.length);
  // Build synthetic raw fields so getItems() can render real detail bullets
  const synth = {};
  // internal
  synth.empAI = answers.int_adoption==="high"?"76-100%":answers.int_adoption==="mid"?"51-75%":"0-25%";
  synth.lClaude=1; synth.lGPT=0; synth.lGemini=0; synth.lOther=answers.int_license==="yes"?"Y":"";
  synth.ag = answers.int_agents==="yes"?"Agents deployed in production (per scenario input)":"None currently";
  synth.dt = answers.int_agents==="yes"?"claude code":""; // needed for hasRA
  synth.meas = answers.int_measure||"none";
  synth.sav = answers.int_savings==="high"?"6-10":answers.int_savings==="low"?"0-5":"0";
  // hiring
  synth.tal = answers.hiring_roles==="yes"?["AI/ML Engineers"]:[];
  synth.hir = answers.hiring_impact==="high"?"reduced_11_25":answers.hiring_impact==="some"?"reduced_1_10":"no";
  // gtm
  const tofCount = answers.gtm_tof==="high"?4:answers.gtm_tof==="mid"?2:0;
  const mofCount = answers.gtm_mof==="high"?5:answers.gtm_mof==="mid"?2:0;
  synth.tof = Array(tofCount).fill("Lead Gen");
  synth.mof = Array(mofCount).fill("Call Transcription");
  synth.gt = answers.gtm_tof!==undefined?"AI tools in use (per scenario input)":"";
  synth.gi = answers.gtm_impact==="yes"?"10%+ improvement in GTM metric":answers.gtm_impact==="some"?"Some improvement, below 10%":"No measurable impact yet";
  // postsales
  synth.cb = answers.ps_chatbot==="yes"?"Yes":"No";
  synth.cbV = answers.ps_chatbot==="yes"?"AI chatbot deployed":"";
  synth.cbD = answers.ps_deflection==="high"?"75":answers.ps_deflection==="low"?"40":"";
  synth.csat = answers.ps_csat==="yes"?"Measuring AI vs human CSAT":"";
  synth.ps = [];
  // devprod
  synth.eAI = answers.dev_use==="yes"?"Yes":"No";
  synth.dm = answers.dev_impact!=="none"&&answers.dev_impact!==undefined?"Productivity metrics tracked (per scenario input)":"";
  synth.di = answers.dev_impact==="high"?"50%+ productivity gain":answers.dev_impact==="low"?"0-49% productivity gain":"No impact documented";
  // datainfra
  const dinfCount = answers.data_breadth==="high"?3:answers.data_breadth==="mid"?2:0;
  synth.dinf = Array(dinfCount).fill("Data Unification");
  synth.da = answers.data_access==="api"?"api":answers.data_access==="mixed"?"mixed":"manual";
  synth.api = answers.data_api==="yes"?"Yes, broadly deployed":answers.data_api==="progress"?"Yes, limited / in progress":"No, but it's on our roadmap";
  // product
  const ADV2=["Agents","Document Intelligence","Workflow Automation","Recommendations","Analytics & Insights","Voice/Multimodal"];
  synth.lnch = answers.product_launch!=="none"&&answers.product_launch!==undefined?"Yes":"No";
  synth.pt = answers.product_launch==="advanced"?["Agents","Workflow Automation"]:answers.product_launch==="basic"?["Copilot/Assistant"]:[];
  synth.rev = answers.product_rev==="high"?"6-15%":answers.product_rev==="low"?"0 - 5% of 2026 bookings/new revenue":"Not sure";
  synth.rd = answers.product_rd==="high"?"20":answers.product_rd==="low"?"5":"0";
  synth.pr = [];
  synth.cs = "";
  return {co:"Your Scenario",bm:"—",...synth,scores,leading,developing,attention,tier,isScenario:true};
}

// Pre-fill answers from a company's existing data
function prefillFromCompany(c) {
  if (!c) return {};
  const answers = {};
  // product
  const ADV=["Agents","Document Intelligence","Workflow Automation","Recommendations","Analytics & Insights","Voice/Multimodal"];
  const hasAdv = c.lnch==="Yes" && c.pt && c.pt.some(p=>ADV.includes(p));
  answers.product_launch = hasAdv?"advanced":(c.lnch==="Yes"?"basic":"none");
  answers.product_rev    = (c.rev&&["6-15","16-30","31-50","51"].some(x=>c.rev.includes(x)))?"high":(c.rev&&c.rev.includes("0 - 5"))?"low":"none";
  const rd=parseRD(c.rd);
  answers.product_rd     = rd>10?"high":rd>=1?"low":"none";
  // devprod
  answers.dev_use    = c.eAI==="Yes"?"yes":"no";
  answers.dev_tools  = sDT(c.dt)>=2?"multi":sDT(c.dt)===1?"one":"none";
  const di=parseDI(c.di);
  answers.dev_impact = di>=3?"high":di>=1?"low":"none";
  // datainfra
  const dl=c.dinf?c.dinf.length:0;
  answers.data_breadth = dl>=3?"high":dl===2?"mid":"low";
  answers.data_access  = c.da==="api"?"api":c.da==="mixed"?"mixed":"manual";
  answers.data_api     = c.api&&c.api.includes("broadly")?"yes":c.api&&(c.api.includes("limited")||c.api.includes("progress"))?"progress":"no";
  // gtm
  const tf=c.tof?c.tof.length:0;
  const mf=c.mof?c.mof.length:0;
  answers.gtm_tof    = tf>=4?"high":tf>=2?"mid":"low";
  answers.gtm_mof    = mf>=5?"high":mf>=2?"mid":"low";
  const gi=parseGI(c.gi);
  answers.gtm_impact = gi>=10?"yes":gi>0?"some":"no";
  // postsales
  answers.ps_chatbot    = c.cb==="Yes"?"yes":"no";
  const defl=parseDefl(c.cbD);
  answers.ps_deflection = defl!==null&&defl>=70?"high":defl!==null?"low":"na";
  answers.ps_csat       = pCSAT(c.csat)!==null?"yes":"no";
  // hiring
  answers.hiring_roles  = (c.tal&&c.tal.length>=1)?"yes":"no";
  answers.hiring_impact = ["reduced_11_25","reduced_26_50"].includes(c.hir)?"high":["reduced_1_10","expect"].includes(c.hir)?"some":"no";
  // internal
  answers.int_adoption = c.empAI==="76-100%"?"high":["51-75%","26-50%"].includes(c.empAI)?"mid":"low";
  answers.int_agents   = hasRA(c.ag,c)?"yes":"no";
  answers.int_measure  = c.meas==="both"?"both":c.meas==="quant"?"quant":c.meas==="qual"?"qual":"none";
  answers.int_savings  = ["6-10","11-15","16+"].includes(c.sav)?"high":c.sav==="0-5"?"low":"none";
  answers.int_license  = (c.lClaude||c.lGPT||c.lGemini||c.lOther)?"yes":"no";
  return answers;
}
